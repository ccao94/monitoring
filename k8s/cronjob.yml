apiVersion: batch/v1
kind: CronJob
metadata:
  name: price-monitor
spec:
  schedule: "0 */6 * * *"  # every 6 hours
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: price-monitor
              image: price-monitor:latest
              imagePullPolicy: Never  # use local image, don't pull from registry
              envFrom:
                - secretRef:
                    name: telegram-credentials
          restartPolicy: OnFailure